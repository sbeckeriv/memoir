<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>memoir · settings</title>
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

body {
  font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
  background: #f4f4f6;
  color: #1a1a1a;
  min-height: 100vh;
}

header {
  background: #fff;
  border-bottom: 1px solid #e2e2e6;
  padding: 0.875rem 1.5rem;
  display: flex;
  align-items: center;
  gap: 1.25rem;
  position: sticky;
  top: 0;
  z-index: 10;
}

header h1 { flex-shrink: 0; line-height: 0; }
header h1 a { display: block; }
.app-icon { height: 28px; width: auto; border-radius: 6px; }

.header-nav { font-size: 0.82rem; color: #aaa; flex-shrink: 0; }
.header-nav a { color: #5b8af4; text-decoration: none; }
.header-nav a:hover { text-decoration: underline; }
.header-nav-current { color: #555; font-weight: 500; }

main {
  max-width: 700px;
  margin: 2rem auto;
  padding: 0 1.5rem 4rem;
}

h2 {
  font-size: 0.75rem;
  font-weight: 600;
  letter-spacing: 0.06em;
  text-transform: uppercase;
  color: #888;
  margin: 2rem 0 0.75rem;
}

h2:first-child { margin-top: 0; }

.card {
  background: #fff;
  border: 1px solid #e2e2e6;
  border-radius: 10px;
  padding: 1.25rem 1.5rem;
  display: flex;
  flex-direction: column;
  gap: 1rem;
}

.field { display: flex; flex-direction: column; gap: 0.35rem; }

label {
  font-size: 0.8rem;
  font-weight: 500;
  color: #555;
}

label .hint {
  font-weight: 400;
  color: #aaa;
  margin-left: 0.4rem;
}

input[type="text"],
input[type="number"],
input[type="password"],
input[type="url"],
select,
textarea {
  padding: 0.5rem 0.75rem;
  border: 1px solid #d0d0d8;
  border-radius: 6px;
  font-size: 0.9rem;
  font-family: inherit;
  background: #fafafa;
  color: #1a1a1a;
  outline: none;
  transition: border-color 0.15s;
  width: 100%;
}

input:focus, select:focus, textarea:focus { border-color: #5b8af4; background: #fff; }

input[type="number"] { max-width: 140px; }

textarea { resize: vertical; min-height: 80px; font-family: ui-monospace, monospace; font-size: 0.82rem; }

.field-pair { display: grid; grid-template-columns: 1fr 1fr; gap: 1rem; }

.form-actions {
  display: flex;
  align-items: center;
  gap: 1rem;
  margin-top: 2rem;
}

.btn {
  padding: 0.55rem 1.25rem;
  border-radius: 7px;
  border: none;
  font-size: 0.875rem;
  font-weight: 600;
  cursor: pointer;
  transition: background 0.15s, opacity 0.15s;
}

.btn-primary { background: #5b8af4; color: #fff; }
.btn-primary:hover { background: #4a78e8; }
.btn-primary:disabled { opacity: 0.5; cursor: default; }

.btn-secondary { background: #ededf0; color: #444; }
.btn-secondary:hover { background: #e0e0e4; }

.toast {
  font-size: 0.85rem;
  color: #4caf50;
  display: none;
}

.toast.error { color: #e53935; }
</style>
<link rel="stylesheet" href="/api/custom-css">

<main>

  <h2>Application</h2>
  <div class="card">
    <div class="field-pair">
      <div class="field">
        <label for="host">Host</label>
        <input id="host" type="text" placeholder="127.0.0.1">
      </div>
      <div class="field">
        <label for="port">Port</label>
        <input id="port" type="number" min="1" max="65535" placeholder="8734">
      </div>
    </div>
    <div class="field" style="max-width:200px">
      <label for="ui-poll-secs">UI refresh interval <span class="hint">seconds, 0 to disable</span></label>
      <input id="ui-poll-secs" type="number" min="0" placeholder="30">
    </div>
    <div class="field" style="max-width:300px">
      <label for="hotkey">Quick-search hotkey <span class="hint">e.g. CmdOrCtrl+Shift+Space</span></label>
      <input id="hotkey" type="text" placeholder="CmdOrCtrl+Shift+Space">
    </div>
    <div class="field" style="max-width:200px">
      <label for="cluster-score-high">Cluster score "high" threshold <span class="hint">0–1, default 0.65</span></label>
      <input id="cluster-score-high" type="number" min="0" max="1" step="0.01" placeholder="0.65">
    </div>
  </div>

  <h2>Browser</h2>
  <div class="card">
    <div class="field">
      <label for="browser-kind">Browser</label>
      <select id="browser-kind">
        <option value="orion">Orion</option>
        <option value="chrome">Chrome</option>
        <option value="brave">Brave</option>
        <option value="arc">Arc</option>
        <option value="edge">Edge</option>
        <option value="chromium">Chromium</option>
        <option value="firefox">Firefox</option>
        <option value="safari">Safari</option>
      </select>
      <span id="browser-default-path" class="hint" style="display:block;margin-top:4px"></span>
    </div>
    <div class="field">
      <label for="history-path">History DB path <span class="hint">full path to the browser's History / history file</span></label>
      <input id="history-path" type="text" placeholder="/Users/you/Library/Application Support/Orion/Defaults/history">
    </div>
  </div>

  <h2>Data</h2>
  <div class="card">
    <div class="field">
      <label for="data-dir">Data directory <span class="hint">where index.db is stored</span></label>
      <input id="data-dir" type="text" placeholder="~/.memoir">
    </div>
  </div>

  <h2>Fetch</h2>
  <div class="card">
    <div class="field-pair">
      <div class="field">
        <label for="delay-ms">Delay between requests <span class="hint">ms</span></label>
        <input id="delay-ms" type="number" min="0" placeholder="200">
      </div>
      <div class="field">
        <label for="timeout-secs">Request timeout <span class="hint">seconds</span></label>
        <input id="timeout-secs" type="number" min="1" placeholder="15">
      </div>
    </div>
    <div class="field">
      <label for="user-agent">User-Agent</label>
      <input id="user-agent" type="text" placeholder="memoir/0.1 (personal history indexer)">
    </div>
    <div class="field" style="max-width:200px">
      <label for="max-retries">Max fetch retries <span class="hint">per URL before giving up</span></label>
      <input id="max-retries" type="number" min="1" placeholder="3">
    </div>
    <div class="field">
      <label for="ban">Ban list <span class="hint">one host or host/path prefix per line</span></label>
      <textarea id="ban" rows="4" placeholder="web.archive.org&#10;mail.google.com&#10;github.com/myorg"></textarea>
    </div>
  </div>

  <h2>LLM</h2>
  <div class="card">
    <div class="field">
      <label for="llm-provider">Provider</label>
      <select id="llm-provider">
        <option value="none">None (disabled — no Ask, no semantic search)</option>
        <option value="lm_studio">LM Studio</option>
        <option value="openai">OpenAI-compatible</option>
        <option value="anthropic">Anthropic</option>
      </select>
    </div>
    <div class="field-pair">
      <div class="field">
        <label for="llm-base-url">Base URL</label>
        <input id="llm-base-url" type="url" placeholder="http://localhost:1234">
      </div>
      <div class="field">
        <label for="llm-model">Model</label>
        <input id="llm-model" type="text" placeholder="local-model">
      </div>
    </div>
    <div class="field">
      <label for="llm-api-key">API key <span class="hint">leave blank to keep existing</span></label>
      <input id="llm-api-key" type="password" placeholder="sk-…" autocomplete="off">
    </div>
    <div class="field">
      <label for="max-context-chars">Max context chars <span class="hint">total characters sent to LLM across all sources</span></label>
      <input id="max-context-chars" type="number" min="1000" placeholder="8000">
    </div>
    <div class="field">
      <label for="system-prompt">System prompt <span class="hint">sent before every /ask query — current date is always prepended automatically</span></label>
      <textarea id="system-prompt" rows="10" placeholder="Leave blank to restore the built-in default."></textarea>
    </div>
  </div>

  <h2>Sync</h2>
  <div class="card">
    <div class="field">
      <label for="interval-mins">Auto-sync interval <span class="hint">minutes</span></label>
      <input id="interval-mins" type="number" min="1" placeholder="60">
    </div>
    <div class="field-pair">
      <div class="field">
        <label for="fetch-batch">Fetch batch size <span class="hint">URLs per sync cycle</span></label>
        <input id="fetch-batch" type="number" min="1" placeholder="500">
      </div>
      <div class="field">
        <label for="embed-batch">Embed batch size <span class="hint">pages per sync cycle</span></label>
        <input id="embed-batch" type="number" min="1" placeholder="200">
      </div>
    </div>
    <div class="field">
      <label><input type="checkbox" id="embed-enabled"> Enable semantic search <span id="embed-size-hint" class="hint">downloads ~130 MB embedding model on first use</span></label>
    </div>
    <div class="field" id="embed-model-field">
      <label for="embed-model">Embedding model</label>
      <select id="embed-model" onchange="updateEmbedHint()">
        <optgroup label="English">
          <option value="bge_small_en_v1_5">BGE Small EN v1.5 — 384-dim · ~130 MB · default</option>
          <option value="bge_base_en_v1_5">BGE Base EN v1.5 — 768-dim · ~430 MB · higher accuracy</option>
          <option value="nomic_embed_text_v1_5">Nomic Embed Text v1.5 — 768-dim · ~270 MB · strong accuracy</option>
          <option value="all_mini_lm_l6_v2">all-MiniLM-L6-v2 — 384-dim · ~90 MB · fastest/smallest</option>
        </optgroup>
        <optgroup label="Multilingual (non-English or mixed)">
          <option value="multilingual_e5_small">Multilingual E5 Small — 384-dim · ~120 MB · 100+ languages</option>
          <option value="multilingual_e5_base">Multilingual E5 Base — 768-dim · ~280 MB · 100+ languages · better accuracy</option>
          <option value="paraphrase_multilingual_mini_lm_l12_v2">Paraphrase Multilingual MiniLM-L12 — 384-dim · ~120 MB · 50+ languages</option>
        </optgroup>
      </select>
      <span class="hint" style="margin-top:2px">Changing model requires re-embedding: Manage → Reindex All after saving</span>
    </div>
  </div>

  <h2>Appearance</h2>
  <div class="card">
    <div class="field">
      <label for="custom-css">Custom CSS <span class="hint">applied to all pages — overrides built-in styles</span></label>
      <textarea id="custom-css" rows="8" placeholder="/* e.g. body { font-size: 15px; } */"></textarea>
    </div>
  </div>

  <h2>Export &amp; Import</h2>
  <div class="card">
    <div class="field">
      <label>Export all indexed pages</label>
      <button class="btn btn-secondary" onclick="exportBackup()">Export backup</button>
    </div>
    <div class="field">
      <label for="import-file">Import backup</label>
      <input type="file" id="import-file" accept=".json" style="display:none" onchange="importAll(event)">
      <button class="btn btn-secondary" onclick="document.getElementById('import-file').click()">Choose file…</button>
      <span id="import-status" style="font-size:0.85rem;margin-left:0.5rem"></span>
    </div>
  </div>

  <div class="form-actions">
    <button class="btn btn-primary" id="btn-save" onclick="save()">Save settings</button>
    <a href="/setup" class="btn btn-secondary">Run setup wizard</a>
    <span class="toast" id="toast"></span>
  </div>

  <h2>About</h2>
  <div class="card">
    <div class="field">
      <label>Version</label>
      <span id="app-version" style="font-size:0.9rem;color:var(--text-muted,#888)">—</span>
    </div>
    <div class="field">
      <label>Software update</label>
      <button class="btn btn-secondary" id="btn-check-update" onclick="checkUpdate()">Check for Updates…</button>
      <span id="update-status" style="font-size:0.85rem;margin-left:0.75rem"></span>
    </div>
  </div>

</main>

<script>
let originalApiKey = null;

async function load() {
  const r = await fetch('/api/settings');
  if (!r.ok) { showToast('Failed to load settings', true); return; }
  const s = await r.json();

  document.getElementById('host').value = s.application?.host ?? '';
  document.getElementById('port').value = s.application?.port ?? '';
  document.getElementById('ui-poll-secs').value = s.application?.ui_poll_secs ?? '';
  document.getElementById('custom-css').value = s.application?.custom_css ?? '';
  document.getElementById('hotkey').value = s.application?.hotkey ?? '';
  document.getElementById('cluster-score-high').value = s.application?.cluster_score_high ?? '';
  document.getElementById('browser-kind').value = s.browser?.kind ?? 'orion';
  updateBrowserHint();
  document.getElementById('history-path').value = s.browser?.history_db_path ?? '';
  document.getElementById('data-dir').value = s.data?.dir ?? '';
  document.getElementById('delay-ms').value = s.fetch?.delay_ms ?? '';
  document.getElementById('timeout-secs').value = s.fetch?.timeout_secs ?? '';
  document.getElementById('user-agent').value = s.fetch?.user_agent ?? '';
  document.getElementById('max-retries').value = s.fetch?.max_retries ?? '';
  document.getElementById('ban').value = (s.fetch?.ban ?? []).join('\n');
  document.getElementById('llm-provider').value = s.llm?.provider ?? 'lm_studio';
  document.getElementById('llm-base-url').value = s.llm?.base_url ?? '';
  document.getElementById('llm-model').value = s.llm?.model ?? '';
  originalApiKey = s.llm?.api_key ?? null;
  // never pre-fill the api key field; user must re-enter to change it
  document.getElementById('max-context-chars').value = s.llm?.max_context_chars ?? '';
  document.getElementById('system-prompt').value = s.llm?.system_prompt ?? '';
  document.getElementById('interval-mins').value = s.sync?.interval_mins ?? '';
  document.getElementById('fetch-batch').value = s.sync?.fetch_batch ?? '';
  document.getElementById('embed-batch').value = s.sync?.embed_batch ?? '';
  document.getElementById('embed-enabled').checked = s.embed?.enabled ?? true;
  document.getElementById('embed-model').value = s.embed?.model ?? 'bge_small_en_v1_5';
  updateEmbedHint();
}

async function save() {
  const btn = document.getElementById('btn-save');
  btn.disabled = true;

  const banRaw = document.getElementById('ban').value;
  const ban = banRaw.split('\n').map(s => s.trim()).filter(Boolean);

  const apiKeyField = document.getElementById('llm-api-key').value.trim();
  const apiKey = apiKeyField !== '' ? apiKeyField : originalApiKey;

  const settings = {
    application: {
      host: document.getElementById('host').value.trim(),
      port: parseInt(document.getElementById('port').value, 10) || 8734,
      ui_poll_secs: parseInt(document.getElementById('ui-poll-secs').value, 10) || 30,
      custom_css: document.getElementById('custom-css').value,
      hotkey: document.getElementById('hotkey').value.trim(),
      cluster_score_high: parseFloat(document.getElementById('cluster-score-high').value) || 0.65,
    },
    browser: {
      kind: document.getElementById('browser-kind').value,
      history_db_path: document.getElementById('history-path').value.trim(),
    },
    data: {
      dir: document.getElementById('data-dir').value.trim(),
    },
    fetch: {
      delay_ms: parseInt(document.getElementById('delay-ms').value, 10) || 200,
      timeout_secs: parseInt(document.getElementById('timeout-secs').value, 10) || 15,
      user_agent: document.getElementById('user-agent').value.trim(),
      max_retries: parseInt(document.getElementById('max-retries').value, 10) || 3,
      ban,
    },
    llm: {
      provider: document.getElementById('llm-provider').value,
      base_url: document.getElementById('llm-base-url').value.trim(),
      model: document.getElementById('llm-model').value.trim(),
      max_context_chars: parseInt(document.getElementById('max-context-chars').value, 10) || 8000,
      system_prompt: document.getElementById('system-prompt').value.trim() || null,
      ...(apiKey != null ? { api_key: apiKey } : {}),
    },
    sync: {
      interval_mins: parseInt(document.getElementById('interval-mins').value, 10) || 60,
      fetch_batch: parseInt(document.getElementById('fetch-batch').value, 10) || 500,
      embed_batch: parseInt(document.getElementById('embed-batch').value, 10) || 200,
    },
    embed: {
      enabled: document.getElementById('embed-enabled').checked,
      model: document.getElementById('embed-model').value,
    },
  };

  const r = await fetch('/api/settings', {
    method: 'POST',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify(settings),
  });

  btn.disabled = false;
  if (r.ok) {
    originalApiKey = apiKey;
    document.getElementById('llm-api-key').value = '';
    showToast('Saved');
  } else {
    showToast('Save failed', true);
  }
}

async function exportBackup() {
  const r = await fetch('/api/export/all');
  if (!r.ok) { showToast('Export failed', true); return; }
  const blob = await r.blob();
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href = url;
  a.download = 'memoir-backup.json';
  document.body.appendChild(a);
  a.click();
  document.body.removeChild(a);
  URL.revokeObjectURL(url);
}

function showToast(msg, error = false) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.className = 'toast' + (error ? ' error' : '');
  t.style.display = 'inline';
  setTimeout(() => { t.style.display = 'none'; }, 3000);
}

async function importAll(e) {
  const file = e.target.files[0];
  if (!file) return;
  const status = document.getElementById('import-status');
  status.textContent = 'Importing…';
  status.style.color = '#888';
  try {
    const text = await file.text();
    const data = JSON.parse(text);
    const r = await fetch('/api/import/all', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify(data),
    });
    if (!r.ok) throw new Error();
    const result = await r.json();
    status.textContent = `Imported ${result.pages} pages, ${result.bans} ban entries.`;
    status.style.color = '#4caf50';
  } catch {
    status.textContent = 'Import failed.';
    status.style.color = '#e53935';
  }
  e.target.value = '';
}

load();

async function loadVersion() {
  try {
    const r = await fetch('/api/version');
    if (r.ok) {
      const { version } = await r.json();
      document.getElementById('app-version').textContent = 'v' + version;
    }
  } catch {}
}
loadVersion();

let updatePollTimer = null;

async function checkUpdate() {
  const btn = document.getElementById('btn-check-update');
  const status = document.getElementById('update-status');
  btn.disabled = true;
  status.textContent = 'Checking…';
  status.style.color = '';
  clearInterval(updatePollTimer);

  try {
    await fetch('/api/update/check', { method: 'POST' });
  } catch {
    status.textContent = 'Request failed.';
    status.style.color = '#e53935';
    btn.disabled = false;
    return;
  }

  updatePollTimer = setInterval(async () => {
    try {
      const r = await fetch('/api/update/status');
      if (!r.ok) return;
      const { status: s } = await r.json();
      if (!s || s === 'checking') return;
      clearInterval(updatePollTimer);
      btn.disabled = false;
      if (s === 'up_to_date') {
        status.textContent = '✓ Already up to date';
        status.style.color = '#4caf50';
      } else if (s.startsWith('installing:')) {
        status.textContent = `Downloading v${s.slice(11)}…`;
        status.style.color = '#1976d2';
        return; // keep polling
      } else if (s.startsWith('error:')) {
        status.textContent = s.slice(6);
        status.style.color = '#e53935';
      } else {
        status.textContent = s;
        status.style.color = '';
      }
    } catch {}
  }, 1000);
}
