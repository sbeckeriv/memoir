<title>memoir · activity</title>
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

body {
  font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
  background: #f4f4f6;
  color: #1a1a1a;
  min-height: 100vh;
}

header {
  background: #fff;
  border-bottom: 1px solid #e2e2e6;
  padding: 0.875rem 1.5rem;
  display: flex;
  align-items: center;
  gap: 1.25rem;
  position: sticky;
  top: 0;
  z-index: 10;
}

header h1 { flex-shrink: 0; line-height: 0; }
header h1 a { display: block; }
.app-icon { height: 28px; width: auto; border-radius: 6px; }

.header-nav { font-size: 0.82rem; color: #aaa; flex-shrink: 0; }
.header-nav a { color: #5b8af4; text-decoration: none; }
.header-nav a:hover { text-decoration: underline; }
.header-nav-current { color: #555; font-weight: 500; }

main {
  max-width: 900px;
  margin: 2rem auto;
  padding: 0 1.5rem 4rem;
}

.toolbar {
  display: flex;
  align-items: center;
  gap: 0.5rem;
  margin-bottom: 1.25rem;
  flex-wrap: wrap;
}

.tab-btn {
  padding: 0.35rem 0.9rem;
  border-radius: 999px;
  border: 1px solid #d0d0d8;
  background: #fff;
  font-size: 0.8rem;
  font-weight: 500;
  color: #555;
  cursor: pointer;
  transition: background 0.12s, border-color 0.12s, color 0.12s;
  white-space: nowrap;
}

.tab-btn:hover { background: #f0f0f4; }
.tab-btn.active { background: #5b8af4; border-color: #5b8af4; color: #fff; }

.spacer { flex: 1; }

.live-badge {
  font-size: 0.75rem;
  color: #aaa;
  display: flex;
  align-items: center;
  gap: 0.4rem;
}

.live-dot {
  width: 7px;
  height: 7px;
  border-radius: 50%;
  background: #4caf50;
  animation: pulse 2s infinite;
}

@keyframes pulse {
  0%, 100% { opacity: 1; }
  50% { opacity: 0.35; }
}

.log-list {
  display: flex;
  flex-direction: column;
  gap: 0;
}

.log-entry {
  background: #fff;
  border: 1px solid #e2e2e6;
  border-bottom: none;
  padding: 0.75rem 1rem;
  display: grid;
  grid-template-columns: 80px auto 1fr;
  gap: 0.75rem;
  align-items: start;
  cursor: default;
  transition: background 0.1s;
}

.log-entry:first-child { border-radius: 10px 10px 0 0; }
.log-entry:last-child { border-bottom: 1px solid #e2e2e6; border-radius: 0 0 10px 10px; }
.log-entry:only-child { border-radius: 10px; border-bottom: 1px solid #e2e2e6; }
.log-entry.has-detail { cursor: pointer; }
.log-entry.has-detail:hover { background: #fafafa; }
.log-entry.expanded { background: #fafafa; }

.log-ts {
  font-size: 0.75rem;
  color: #aaa;
  padding-top: 0.15rem;
  white-space: nowrap;
}

.log-kind {
  display: inline-block;
  padding: 0.15rem 0.55rem;
  border-radius: 999px;
  font-size: 0.7rem;
  font-weight: 600;
  letter-spacing: 0.03em;
  text-transform: uppercase;
  white-space: nowrap;
  align-self: start;
}

.log-kind-sync  { background: #e8effe; color: #3a6bd4; }
.log-kind-llm   { background: #f0ebff; color: #7c4dcc; }
.log-kind-search { background: #e8f5e9; color: #2e7d32; }
.log-kind-error { background: #ffebee; color: #c62828; }

.log-body { min-width: 0; }

.log-message {
  font-size: 0.875rem;
  color: #222;
  word-break: break-word;
  line-height: 1.45;
}

.log-detail {
  font-size: 0.8rem;
  color: #666;
  margin-top: 0.5rem;
  white-space: pre-wrap;
  word-break: break-word;
  line-height: 1.5;
  display: none;
  border-left: 2px solid #e2e2e6;
  padding-left: 0.75rem;
}

.log-entry.expanded .log-detail { display: block; }

.empty-state {
  text-align: center;
  padding: 4rem 1rem;
  color: #aaa;
  font-size: 0.9rem;
}
</style>

<main>
  <div class="toolbar">
    <button class="tab-btn active" data-kind="">All</button>
    <button class="tab-btn" data-kind="sync">Sync</button>
    <button class="tab-btn" data-kind="search">Search</button>
    <button class="tab-btn" data-kind="llm">Ask</button>
    <button class="tab-btn" data-kind="error">Errors</button>
    <div class="spacer"></div>
    <div class="live-badge"><span class="live-dot"></span> live</div>
  </div>

  <div class="log-list" id="log-list"></div>
</main>

<script>
let activeKind = '';
let entries = [];
let timer;

document.querySelectorAll('.tab-btn').forEach(btn => {
  btn.addEventListener('click', () => {
    document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    activeKind = btn.dataset.kind;
    render();
  });
});

async function load() {
  const url = '/api/log' + (activeKind ? '?kind=' + activeKind : '');
  try {
    const r = await fetch(url);
    if (!r.ok) return;
    entries = await r.json();
    render();
  } catch(_) {}
}

function render() {
  const list = document.getElementById('log-list');
  if (!entries.length) {
    list.innerHTML = '<div class="empty-state">No activity yet</div>';
    return;
  }
  list.innerHTML = entries.map((e, i) => {
    const hasDetail = !!e.detail;
    return `<div class="log-entry${hasDetail ? ' has-detail' : ''}" data-i="${i}" onclick="toggle(${i})">
      <div class="log-ts">${reltime(e.ts)}</div>
      <div class="log-kind log-kind-${e.kind}">${kindLabel(e.kind)}</div>
      <div class="log-body">
        <div class="log-message">${esc(e.message)}</div>
        ${hasDetail ? `<div class="log-detail">${esc(e.detail)}</div>` : ''}
      </div>
    </div>`;
  }).join('');
}

function toggle(i) {
  const el = document.querySelector(`.log-entry[data-i="${i}"]`);
  if (el && el.classList.contains('has-detail')) {
    el.classList.toggle('expanded');
  }
}

function kindLabel(k) {
  return { sync: 'Sync', llm: 'Ask', search: 'Search', error: 'Error' }[k] || k;
}

function reltime(iso) {
  const diff = Math.floor((Date.now() - new Date(iso)) / 1000);
  if (diff < 5) return 'just now';
  if (diff < 60) return diff + 's ago';
  if (diff < 3600) return Math.floor(diff / 60) + 'm ago';
  if (diff < 86400) return Math.floor(diff / 3600) + 'h ago';
  return new Date(iso).toLocaleDateString();
}

function esc(s) {
  return String(s)
    .replace(/&/g, '&amp;')
    .replace(/</g, '&lt;')
    .replace(/>/g, '&gt;')
    .replace(/"/g, '&quot;');
}

function poll() {
  load();
  timer = setTimeout(poll, 2000);
}

poll();
</script>
